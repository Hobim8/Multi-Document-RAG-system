services:
  # Backend API
  - type: web
    name: pdf-rag-api 
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT 
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.1 

  # Frontend 
  - type: web
    name: pdf-rag-frontend
    env: python 
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: BACKEND_URL 
        sync: false 

